<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Matching Demo (Improved UI)</title>

<link href="bootstrap-3.3.5-dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f5f5f5;
}

.container {
    margin-top: 25px;
}

.panel-box {
    background: white;
    padding: 15px;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    margin-bottom: 15px;
    text-align: center;
}

#canvas {
    width: 100%;
    border: 1px solid #ddd;
    background: #fff;
}

select, button {
    margin-top: 10px;
}

.status {
    margin-top: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <div class="row">

        <!-- LEFT: QUERY -->
        <div class="col-md-3">
            <div class="panel-box">
                <h4>Query Image</h4>

                <select id="selector" class="form-control">
                    <option value="q1">Maelstrom</option>
                    <option value="q2">Smiley</option>
                    <option value="q3">Elon</option>
                </select>

                <img id="img_q" src="images/q1.jpg" style="width:100%; margin-top:10px;">

                <button id="runBtn" class="btn btn-primary btn-block">
                    Run Matching
                </button>

                <div class="status" id="status">Ready</div>
            </div>
        </div>

        <!-- RIGHT: CANVAS -->
        <div class="col-md-9">
            <div class="panel-box">
                <h4>Match Result</h4>
                <canvas id="canvas" width="900" height="300"></canvas>
            </div>
        </div>

    </div>
</div>

<script src="tracking.js/build/tracking-min.js"></script>
<script src="jquery-2.1.4/jquery-2.1.4.min.js"></script>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const width = 450;
const height = 300;
const numberImages = 5;

window.descriptorLength = 256;
window.matchesShown = 30;

function loadImage(img) {
    return new Promise(resolve => {
        if (img.complete) resolve(img);
        else img.onload = () => resolve(img);
    });
}

function setStatus(msg) {
    document.getElementById("status").innerText = msg;
}

function getQueryImage() {
    return document.getElementById("img_q");
}

function clearCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

async function doMatch() {
    setStatus("Loading images...");

    const img_q = getQueryImage();
    await loadImage(img_q); // FIX: ensures updated image is ready

    tracking.Brief.N = window.descriptorLength;

    let bestScore = 0;
    let bestMatch = null;
    let bestMatches = null;

    clearCanvas();

    for (let i = 0; i < numberImages; i++) {

        const img_i = document.getElementById("img_" + (i + 1));

        ctx.drawImage(img_q, 0, 0, width, height);
        ctx.drawImage(img_i, width, 0, width, height);

        const imgData1 = ctx.getImageData(0, 0, width, height);
        const imgData2 = ctx.getImageData(width, 0, width, height);

        const gray1 = tracking.Image.grayscale(imgData1.data, width, height);
        const gray2 = tracking.Image.grayscale(imgData2.data, width, height);

        const corners1 = tracking.Fast.findCorners(gray1, width, height);
        const corners2 = tracking.Fast.findCorners(gray2, width, height);

        const desc1 = tracking.Brief.getDescriptors(gray1, width, corners1);
        const desc2 = tracking.Brief.getDescriptors(gray2, width, corners2);

        const matches = tracking.Brief.match(corners1, desc1, corners2, desc2);

        matches.sort((a,b) => b.confidence - a.confidence);

        if (matches.length) {
            let avg = 0;
            for (let m of matches) avg += m.confidence;
            avg /= matches.length;

            if (avg > bestScore) {
                bestScore = avg;
                bestMatch = img_i;
                bestMatches = matches;
            }
        }
    }

    if (bestMatch) {
        ctx.drawImage(bestMatch, width, 0, width, height);

        for (let i = 0; i < Math.min(window.matchesShown, bestMatches.length); i++) {
            const m = bestMatches[i];
            const color = `hsl(${Math.random()*360}, 100%, 50%)`;

            ctx.fillStyle = color;
            ctx.strokeStyle = color;

            ctx.fillRect(m.keypoint1[0], m.keypoint1[1], 4, 4);
            ctx.fillRect(m.keypoint2[0] + width, m.keypoint2[1], 4, 4);

            ctx.beginPath();
            ctx.moveTo(m.keypoint1[0], m.keypoint1[1]);
            ctx.lineTo(m.keypoint2[0] + width, m.keypoint2[1]);
            ctx.stroke();
        }

        setStatus(`Best match score: ${bestScore.toFixed(3)}`);
    } else {
        setStatus("No match found");
    }
}

// UI events
document.getElementById("selector").addEventListener("change", function () {
    const val = this.value;
    const img = document.getElementById("img_q");
    img.src = "images/" + val + ".jpg";
    setStatus("Image changed (ready to match)");
});

document.getElementById("runBtn").addEventListener("click", doMatch);

// init
doMatch();
</script>

</body>
</html>
