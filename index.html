<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Matching UI</title>

<link href="bootstrap-3.3.5-dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f4f6f9;
}

.panel-box {
    background: #fff;
    border-radius: 8px;
    padding: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    margin-bottom: 15px;
}

#results {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
}

.result-card {
    width: 160px;
    cursor: pointer;
    border: 2px solid transparent;
    border-radius: 6px;
    overflow: hidden;
    background: white;
    transition: 0.2s;
}

.result-card:hover {
    transform: scale(1.03);
    border-color: #337ab7;
}

.result-card img {
    width: 100%;
    height: 120px;
    object-fit: cover;
}

.result-info {
    padding: 6px;
    font-size: 12px;
    text-align: center;
}

.badge-score {
    background: #337ab7;
}

.status {
    margin-top: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container-fluid" style="margin-top:20px;">

    <div class="row">

        <!-- QUERY PANEL -->
        <div class="col-md-3">
            <div class="panel-box">
                <h4>Query Panel</h4>

                <select id="selector" class="form-control">
                    <option value="q1">Maelstrom</option>
                    <option value="q2">Smiley</option>
                    <option value="q3">Elon</option>
                </select>

                <img id="img_q" src="images/q1.jpg"
                     style="width:100%; margin-top:10px; border-radius:6px;">

                <button id="runBtn" class="btn btn-primary btn-block" style="margin-top:10px;">
                    Run Matching
                </button>

                <div class="status text-info" id="status">Ready</div>
            </div>
        </div>

        <!-- RESULTS GRID (FULL SPACE) -->
        <div class="col-md-9">
            <div class="panel-box">
                <h4>Results</h4>
                <div id="results"></div>
            </div>
        </div>

    </div>
</div>

<!-- HIDDEN DATASET IMAGES -->
<div style="display:none;">
    <img id="img_1" src="images/img_1.jpg">
    <img id="img_2" src="images/img_2.jpg">
    <img id="img_3" src="images/img_3.jpg">
    <img id="img_4" src="images/img_4.jpg">
    <img id="img_5" src="images/img_5.jpg">
</div>

<!-- MODAL FOR MATCH DETAIL -->
<div class="modal fade" id="detailModal">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal">&times;</button>
                <h4 class="modal-title">Match Detail</h4>
            </div>

            <div class="modal-body">
                <canvas id="modalCanvas" width="900" height="400"
                        style="width:100%; border:1px solid #ddd;"></canvas>
            </div>

        </div>
    </div>
</div>

<script src="tracking.js/build/tracking-min.js"></script>
<script src="jquery-2.1.4/jquery-2.1.4.min.js"></script>
<script src="bootstrap-3.3.5-dist/js/bootstrap.min.js"></script>

<script>
const width = 300;
const height = 300;
const numberImages = 5;

window.descriptorLength = 256;

const modalCanvas = document.getElementById("modalCanvas");
const mctx = modalCanvas.getContext("2d");

let lastResults = [];

function setStatus(msg) {
    document.getElementById("status").innerText = msg;
}

function loadImage(img) {
    return new Promise(resolve => {
        if (!img) return resolve();

        if (img.decode) {
            img.decode().then(() => resolve(img)).catch(() => resolve(img));
            return;
        }

        if (img.complete && img.naturalWidth > 0) {
            return resolve(img);
        }

        img.onload = () => resolve(img);
        img.onerror = () => resolve(img);
    });
}

function renderResults(results) {
    const container = document.getElementById("results");
    container.innerHTML = "";

    results.forEach((r, idx) => {
        const div = document.createElement("div");
        div.className = "result-card";

        div.innerHTML = `
            <img src="${r.src}">
            <div class="result-info">
                #${idx + 1}
                <span class="badge badge-score pull-right">
                    ${r.score.toFixed(3)}
                </span>
            </div>
        `;

        div.onclick = () => showDetail(r);

        container.appendChild(div);
    });
}

function drawMatch(ctx, q, m, matches) {
    ctx.clearRect(0, 0, 900, 400);

    const w = 450;
    const h = 300;

    ctx.drawImage(q, 0, 0, w, h);
    ctx.drawImage(m, w, 0, w, h);

    matches.slice(0, 25).forEach(match => {
        const color = `hsl(${Math.random()*360},100%,50%)`;

        ctx.fillStyle = color;
        ctx.strokeStyle = color;

        ctx.fillRect(match.keypoint1[0], match.keypoint1[1], 3, 3);
        ctx.fillRect(match.keypoint2[0] + w, match.keypoint2[1], 3, 3);

        ctx.beginPath();
        ctx.moveTo(match.keypoint1[0], match.keypoint1[1]);
        ctx.lineTo(match.keypoint2[0] + w, match.keypoint2[1]);
        ctx.stroke();
    });
}

async function showDetail(result) {
    const q = document.getElementById("img_q");
    const m = result.img;

    await loadImage(q);
    await loadImage(m);

    drawMatch(mctx, q, m, result.matches);

    $("#detailModal").modal("show");
}

async function doMatch() {

    setStatus("Processing...");

    const img_q = document.getElementById("img_q");
    await loadImage(img_q);

    tracking.Brief.N = window.descriptorLength;

    let results = [];

    for (let i = 1; i <= numberImages; i++) {

        const img_i = document.getElementById("img_" + i);
        if (!img_i) continue;

        await loadImage(img_i);

        const c = document.createElement("canvas");
        c.width = width * 2;
        c.height = height;

        const ctx = c.getContext("2d");

        ctx.drawImage(img_q, 0, 0, width, height);
        ctx.drawImage(img_i, width, 0, width, height);

        const d1 = ctx.getImageData(0, 0, width, height);
        const d2 = ctx.getImageData(width, 0, width, height);

        const g1 = tracking.Image.grayscale(d1.data, width, height);
        const g2 = tracking.Image.grayscale(d2.data, width, height);

        const c1 = tracking.Fast.findCorners(g1, width, height);
        const c2 = tracking.Fast.findCorners(g2, width, height);

        const dsc1 = tracking.Brief.getDescriptors(g1, width, c1);
        const dsc2 = tracking.Brief.getDescriptors(g2, width, c2);

        let matches = tracking.Brief.match(c1, dsc1, c2, dsc2);
        matches.sort((a,b) => b.confidence - a.confidence);

        let score = 0;
        matches.forEach(m => score += m.confidence);
        score /= (matches.length || 1);

        results.push({
            img: img_i,
            src: img_i.src,
            score,
            matches
        });
    }

    results.sort((a,b) => b.score - a.score);

    lastResults = results;

    renderResults(results);

    setStatus("Done. Best match: " + (results[0]?.score || 0).toFixed(3));
}

// EVENTS
document.getElementById("selector").addEventListener("change", function () {
    document.getElementById("img_q").src = "images/" + this.value + ".jpg";
});

document.getElementById("runBtn").addEventListener("click", doMatch);

// INIT
doMatch();
</script>

</body>
</html>
